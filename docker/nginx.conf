# Serves /var/hls/* over HTTP.
# Mounted read-only from the bot container.

worker_processes 1;
events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # HLS-specific MIME types
    types {
        application/vnd.apple.mpegurl   m3u8;
        video/mp2t                       ts;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;

    # No caching for the playlist (it changes constantly), aggressive caching for segments
    map $request_uri $hls_cache {
        ~*\.m3u8$  "no-cache, no-store, must-revalidate";
        ~*\.ts$    "public, max-age=31536000, immutable";
        default    "no-cache";
    }

    server {
        listen 80;
        server_name _;

        # CORS so users can play the stream from anywhere
        add_header Access-Control-Allow-Origin   "*" always;
        add_header Access-Control-Allow-Headers  "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        add_header Cache-Control                 $hls_cache always;

        # The stream itself
        location /stream/ {
            alias /var/hls/;
            autoindex off;
        }

        # Reverse-proxy the bot's control API so the frontend can talk to it
        # from the same origin (no CORS dance needed).
        location /api/ {
            proxy_pass http://bot:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # Tiny landing page with hls.js player at /
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location /static/ {
            root /usr/share/nginx/html;
        }

        # Health
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
