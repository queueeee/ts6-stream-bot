# ts6-stream-bot stack
#
# Single container. Renders YouTube/Twitch/etc. in a headful Chromium running
# inside Xvfb, captures the frames + audio, and (post phase 1) speaks the TS3
# voice protocol directly to push the result into a TS6 channel via the
# server's built-in stream feature. No HLS, no second nginx container.
#
# Two networking modes are available via compose profiles:
#
#   * default (profile "bridge"): bot runs in the standard ts6-net bridge.
#     Simple, isolated, but WebRTC ICE candidate gathering can struggle -
#     STUN responses to the docker bridge IP often don't establish a
#     usable srflx candidate, so peers can't NAT-punch back to the bot.
#
#   * profile "host": bot runs in the host network namespace. The host's
#     real LAN/WAN IPs become the ICE candidates, STUN works normally,
#     and viewers can reach the bot. Trade-off: shares the host's port
#     space (8080 must be free on the host), needs the TS6 server
#     reachable via 127.0.0.1 / a public hostname.
#
# Use one or the other, not both:
#
#     docker compose --profile bridge up -d   # original behaviour
#     docker compose --profile host   up -d   # works around ICE failures
#
# Without --profile only the bridge service runs (matching prior behaviour
# so existing setups keep working unchanged).

services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ts6-stream-bot
    profiles: ["", "bridge"]
    restart: unless-stopped
    env_file: .env
    shm_size: "1gb"
    volumes:
      - ./src:/app/src:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - ts6-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  bot-host:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ts6-stream-bot
    profiles: ["host"]
    restart: unless-stopped
    env_file: .env
    shm_size: "1gb"
    network_mode: host
    volumes:
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  ts6-net:
    external: true
