# ts6-stream-bot stack
#
# Single container. Renders YouTube/Twitch/etc. in a headful Chromium running
# inside Xvfb, captures the frames + audio, and (post phase 1) speaks the TS3
# voice protocol directly to push the result into a TS6 channel via the
# server's built-in stream feature. No HLS, no second nginx container.

services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ts6-stream-bot
    restart: unless-stopped
    env_file: .env
    # We need ipc=host or a large /dev/shm so Chromium doesn't crash with
    # "out of shared memory" on big frames.
    shm_size: "1gb"
    volumes:
      # Mount sources read-only so a code edit doesn't require rebuild during dev
      - ./src:/app/src:ro
    ports:
      - "127.0.0.1:8080:8080"   # control API - keep local; expose via reverse proxy if needed
    networks:
      - ts6-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  ts6-net:
    external: true
