<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ts6-stream-bot</title>
  <style>
    :root { color-scheme: dark; --accent: #2a6df4; --bg: #0b0d0f; --panel: #14171b; --border: #2a2f36; --muted: #8a8f96; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: #e8eaed;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    body { display: flex; flex-direction: column; }

    header { padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 1rem; margin: 0 0.6rem 0 0; opacity: 0.85; font-weight: 500; }
    .pill { padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; background: #555; text-transform: lowercase; }
    .pill.playing { background: #2ea043; }
    .pill.loading { background: #d29922; }
    .pill.paused  { background: #6e7681; }
    .pill.idle    { background: #555; }

    main { flex: 1; display: grid; grid-template-columns: 1fr 320px; min-height: 0; }
    .stage { display: grid; place-items: center; background: #000; min-height: 0; }
    .stage video { max-width: 100%; max-height: 100%; }

    aside.controls { border-left: 1px solid var(--border); background: var(--panel); padding: 1rem; overflow: auto; display: flex; flex-direction: column; gap: 0.8rem; }
    aside.controls h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0.4rem 0 0; font-weight: 500; }
    aside.controls input, aside.controls button {
      background: #0e1115; border: 1px solid var(--border); color: inherit;
      padding: 0.45rem 0.7rem; border-radius: 4px; font: inherit; width: 100%;
    }
    aside.controls button { cursor: pointer; }
    aside.controls button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    aside.controls button:hover:not(:disabled) { filter: brightness(1.15); }
    aside.controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; gap: 0.4rem; }
    .row > * { flex: 1; }
    .info { font-size: 0.8rem; color: var(--muted); word-break: break-all; }
    .info b { color: #e8eaed; font-weight: 500; }
    .err { color: #ff6b6b; font-size: 0.8rem; min-height: 1em; }

    footer { padding: 0.4rem 1rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); }

    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      aside.controls { border-left: 0; border-top: 1px solid var(--border); max-height: 50vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ts6-stream-bot</h1>
    <span id="state" class="pill idle">idle</span>
    <span id="title" class="info" style="flex: 1; min-width: 200px;"></span>
  </header>

  <main>
    <section class="stage">
      <video id="player" controls autoplay playsinline muted></video>
    </section>

    <aside class="controls">
      <h2>Player</h2>
      <input id="room" placeholder="room" value="default">
      <button id="watch" class="primary">Watch this room</button>

      <h2>API</h2>
      <input id="apiKey" type="password" placeholder="X-API-Key" autocomplete="off">

      <h2>Cast</h2>
      <input id="url" placeholder="YouTube / Twitch / mp4 URL">
      <div class="row">
        <button id="play" class="primary">Play</button>
        <button id="stop">Stop</button>
      </div>
      <div class="row">
        <button id="pause">Pause</button>
        <button id="resume">Resume</button>
      </div>
      <div class="row">
        <input id="seekSec" type="number" min="0" step="1" placeholder="seconds">
        <button id="seek">Seek</button>
      </div>

      <div class="err" id="err"></div>
      <div class="info" id="status"></div>
      <div class="info" id="path"></div>
    </aside>
  </main>

  <footer>
    Open <code>/stream/&lt;room&gt;/index.m3u8</code> directly in any HLS-capable client.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const video = $('player');
    const stateEl = $('state');
    const titleEl = $('title');
    const pathEl = $('path');
    const statusEl = $('status');
    const errEl = $('err');
    const roomIn = $('room');
    const apiKeyIn = $('apiKey');
    const urlIn = $('url');

    apiKeyIn.value = localStorage.getItem('ts6_api_key') || '';
    apiKeyIn.addEventListener('change', () => localStorage.setItem('ts6_api_key', apiKeyIn.value));

    let hls;
    function attach(src) {
      pathEl.textContent = src;
      if (hls) { hls.destroy(); hls = null; }
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;
      } else if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ liveDurationInfinity: true, lowLatencyMode: true });
        hls.loadSource(src);
        hls.attachMedia(video);
      } else {
        showErr('HLS playback not supported in this browser.');
      }
    }

    function showErr(msg) {
      errEl.textContent = msg || '';
      if (msg) console.warn('[ts6]', msg);
    }

    function renderStatus(s) {
      stateEl.textContent = s.state;
      stateEl.className = 'pill ' + s.state;
      titleEl.textContent = s.title || '';
      statusEl.innerHTML =
        (s.source_class ? `<b>${s.source_class}</b><br>` : '') +
        (s.url ? `<a href="${s.url}" target="_blank" style="color: inherit;">${s.url}</a><br>` : '') +
        (s.error ? `<span style="color:#ff6b6b">${s.error}</span>` : '');
    }

    async function api(method, path, body) {
      const headers = { 'Accept': 'application/json' };
      if (body) headers['Content-Type'] = 'application/json';
      const key = apiKeyIn.value.trim();
      if (key) headers['X-API-Key'] = key;
      const resp = await fetch('/api' + path, {
        method, headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      let data = null;
      try { data = await resp.json(); } catch { /* not JSON */ }
      if (!resp.ok) {
        const detail = data?.detail || data?.error || resp.statusText;
        throw new Error(`${resp.status} ${detail}`);
      }
      return data;
    }

    async function refreshStatus() {
      try {
        const s = await api('GET', '/status');
        renderStatus(s);
      } catch (e) {
        showErr('status: ' + e.message);
      }
    }

    function withErr(fn) {
      return async () => {
        showErr('');
        try { renderStatus(await fn()); } catch (e) { showErr(e.message); }
      };
    }

    $('watch').addEventListener('click', () => {
      const room = (roomIn.value || 'default').trim();
      attach(`/stream/${encodeURIComponent(room)}/index.m3u8`);
    });

    $('play').addEventListener('click', withErr(async () => {
      const url = urlIn.value.trim();
      if (!url) throw new Error('URL is empty');
      const room = (roomIn.value || 'default').trim();
      return await api('POST', '/play', { url, room });
    }));
    $('pause').addEventListener('click', withErr(() => api('POST', '/pause')));
    $('resume').addEventListener('click', withErr(() => api('POST', '/resume')));
    $('stop').addEventListener('click', withErr(() => api('POST', '/stop')));
    $('seek').addEventListener('click', withErr(() => {
      const seconds = parseInt($('seekSec').value, 10);
      if (Number.isNaN(seconds) || seconds < 0) throw new Error('invalid seek seconds');
      return api('POST', '/seek', { seconds });
    }));

    // Auto-attach + poll status
    attach(`/stream/default/index.m3u8`);
    refreshStatus();
    setInterval(refreshStatus, 3000);
  </script>
</body>
</html>
